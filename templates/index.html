{% extends "base.html" %}

{% block content %}
<h1>{{ config.title }}</h1>

{% for page in section.pages | reverse %}
{% set full = get_page(path=page.relative_path) %}
<hr>
<h2>{{ full.title }}</h2>
<time>{{ full.date | date(format="%B %d, %Y") }}</time>

{{ full.content | safe }}

{% endfor %}

{% endblock content %}
