{% extends "base.html" %}

{% block content %}
<h1>{{ config.title }}</h1>

{% for page in section.pages | reverse %}
<div>
    <h3><a href="{{ page.permalink }}">{{ page.title }}</a></h3>
    <time>{{ page.date | date(format="%B %d, %Y") }}</time>
    <p>{{ page.description }}</p>
</div>
{% endfor %}

{% endblock content %}
